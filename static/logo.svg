<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 130">
  <defs>
    <!-- Front face gradient: silver top-left → steel blue bottom-right -->
    <linearGradient id="sf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#ddeaf4"/>
      <stop offset="30%" stop-color="#9abdd4"/>
      <stop offset="70%" stop-color="#4a88b0"/>
      <stop offset="100%" stop-color="#1e4f72"/>
    </linearGradient>
    <!-- Right/side face: dark steel -->
    <linearGradient id="sd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2e5e80"/>
      <stop offset="100%" stop-color="#0d2a42"/>
    </linearGradient>
    <!-- Bottom face: very dark -->
    <linearGradient id="sb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#1a3c58"/>
      <stop offset="100%" stop-color="#081828"/>
    </linearGradient>
    <!-- Highlight strip -->
    <linearGradient id="sh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Eye outer iris -->
    <radialGradient id="eo" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#1e6ae0"/>
      <stop offset="60%"  stop-color="#0a3aaa"/>
      <stop offset="100%" stop-color="#061880"/>
    </radialGradient>
    <!-- Eye inner lens -->
    <radialGradient id="ei" cx="38%" cy="32%" r="60%">
      <stop offset="0%"   stop-color="#60baff"/>
      <stop offset="50%"  stop-color="#1a72e8"/>
      <stop offset="100%" stop-color="#0a2870"/>
    </radialGradient>
    <!-- Eye glow -->
    <filter id="eg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- Body shadow -->
    <filter id="ds"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000814" flood-opacity="0.55"/></filter>
  </defs>

  <!-- ═══════ TOP ARM ═══════ -->
  <!-- Front face -->
  <polygon points="10,10  86,10  98,26  22,26" fill="url(#sf)" filter="url(#ds)"/>
  <!-- Right side face (dark) -->
  <polygon points="86,10  98,10  98,26  86,26" fill="url(#sd)"/>
  <!-- Top highlight strip -->
  <polygon points="10,10  86,10  90,14  14,14" fill="url(#sh)" opacity="0.7"/>
  <!-- Bottom edge shadow -->
  <polygon points="22,24  98,24  98,26  22,26" fill="#06121e" opacity="0.35"/>

  <!-- ═══════ TOP-RIGHT VERTICAL ═══════ -->
  <!-- Front face -->
  <polygon points="84,26  98,26  98,60  84,60" fill="url(#sd)"/>
  <!-- Left highlight -->
  <polygon points="84,26  90,26  90,60  84,60" fill="url(#sf)" opacity="0.45"/>

  <!-- ═══════ MIDDLE BRIDGE ═══════ -->
  <!-- Front face -->
  <polygon points="22,58  98,58  98,72  22,72" fill="url(#sf)"/>
  <!-- Left shadow face -->
  <polygon points="10,58  22,58  22,72  10,72" fill="url(#sd)"/>
  <!-- Top highlight -->
  <polygon points="22,58  98,58  98,62  22,62" fill="url(#sh)" opacity="0.5"/>

  <!-- ═══════ BOTTOM-LEFT VERTICAL ═══════ -->
  <!-- Front face -->
  <polygon points="10,70  24,70  24,104  10,104" fill="url(#sd)"/>
  <!-- Right highlight -->
  <polygon points="18,70  24,70  24,104  18,104" fill="url(#sf)" opacity="0.4"/>

  <!-- ═══════ BOTTOM ARM ═══════ -->
  <!-- Front face -->
  <polygon points="10,90  86,90  98,106  22,106" fill="url(#sf)" filter="url(#ds)"/>
  <!-- Right side face -->
  <polygon points="86,90  98,90  98,106  86,106" fill="url(#sd)"/>
  <!-- Top highlight strip -->
  <polygon points="10,90  86,90  90,94  14,94" fill="url(#sh)" opacity="0.6"/>
  <!-- Bottom edge shadow -->
  <polygon points="22,104  98,104  98,106  22,106" fill="#06121e" opacity="0.3"/>

  <!-- ═══════ CAMERA EYE ═══════ -->
  <!-- Outer glow halo -->
  <circle cx="62" cy="58" r="26" fill="#0a3090" opacity="0.20" filter="url(#eg)"/>
  <!-- Rim ring -->
  <circle cx="62" cy="58" r="21" fill="#0a2060" stroke="#1a4aaa" stroke-width="1"/>
  <!-- Iris -->
  <circle cx="62" cy="58" r="19" fill="url(#eo)"/>
  <!-- Dark pupil -->
  <circle cx="62" cy="58" r="11.5" fill="#040c1c"/>
  <!-- Inner lens -->
  <circle cx="62" cy="58" r="7.5" fill="url(#ei)"/>
  <!-- Specular highlight large -->
  <ellipse cx="57" cy="53" rx="4" ry="3" fill="white" opacity="0.30" transform="rotate(-20,57,53)"/>
  <!-- Specular highlight small (sharp) -->
  <circle cx="56" cy="52" r="2" fill="white" opacity="0.75"/>
  <circle cx="57" cy="53" r="0.9" fill="white" opacity="0.95"/>
</svg>
